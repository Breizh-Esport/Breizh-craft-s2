name: Deploy Modpack

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-modpack-${{ github.ref }}
  cancel-in-progress: false

env:
  PTERODACTYL_PANEL_URL: ${{ vars.PTERODACTYL_PANEL_URL }}
  PTERODACTYL_SERVER_ID: ${{ vars.PTERODACTYL_SERVER_ID }}
  PTERODACTYL_API_KEY: ${{ secrets.PTERODACTYL_API_KEY }}
  PTERODACTYL_SFTP_HOST: ${{ vars.PTERODACTYL_SFTP_HOST }}
  PTERODACTYL_SFTP_PORT: ${{ vars.PTERODACTYL_SFTP_PORT }}
  PTERODACTYL_SFTP_USERNAME: ${{ vars.PTERODACTYL_SFTP_USERNAME }}
  PTERODACTYL_SFTP_PASSWORD: ${{ secrets.PTERODACTYL_SFTP_PASSWORD }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip lftp

      - name: Install pakku
        run: brew install juraj-hrivnak/pakku/pakku

      - name: Build modpack
        run: pakku export

      - name: Deploy to Pterodactyl
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${PTERODACTYL_PANEL_URL}" ] || [ -z "${PTERODACTYL_SERVER_ID}" ] || [ -z "${PTERODACTYL_API_KEY}" ]; then
            echo "Missing required Pterodactyl API variables/secrets."
            exit 1
          fi

          if [ -z "${PTERODACTYL_SFTP_HOST}" ] || [ -z "${PTERODACTYL_SFTP_USERNAME}" ] || [ -z "${PTERODACTYL_SFTP_PASSWORD}" ]; then
            echo "Missing required SFTP variables/secrets."
            exit 1
          fi

          PANEL_URL="${PTERODACTYL_PANEL_URL%/}"
          API_BASE="${PANEL_URL}/api/client/servers/${PTERODACTYL_SERVER_ID}"
          AUTH_HEADER="Authorization: Bearer ${PTERODACTYL_API_KEY}"
          ACCEPT_HEADER="Accept: Application/vnd.pterodactyl.v1+json"
          SFTP_PORT="${PTERODACTYL_SFTP_PORT:-2022}"

          api_json() {
            local method="$1"
            local endpoint="$2"
            local body="${3:-}"
            if [ -n "${body}" ]; then
              curl -fsSL -X "${method}" \
                -H "${AUTH_HEADER}" \
                -H "${ACCEPT_HEADER}" \
                -H "Content-Type: application/json" \
                "${API_BASE}${endpoint}" \
                -d "${body}"
            else
              curl -fsSL -X "${method}" \
                -H "${AUTH_HEADER}" \
                -H "${ACCEPT_HEADER}" \
                "${API_BASE}${endpoint}"
            fi
          }

          echo "Stopping server..."
          api_json POST "/power" '{"signal":"stop"}' || true

          echo "Waiting for server to stop..."
          for _ in $(seq 1 30); do
            state="$(api_json GET "/resources" | jq -r '.attributes.current_state')"
            if [ "${state}" = "offline" ]; then
              break
            fi
            sleep 5
          done

          final_state="$(api_json GET "/resources" | jq -r '.attributes.current_state')"
          if [ "${final_state}" != "offline" ]; then
            echo "Server did not stop in time (state: ${final_state})."
            exit 1
          fi

          echo "Preparing serverpack..."
          ZIP_FILE="$(ls -1 build/serverpack/*.zip | head -n 1)"
          if [ -z "${ZIP_FILE}" ]; then
            echo "No serverpack zip found in build/serverpack."
            exit 1
          fi

          echo "Extracting serverpack locally..."
          EXTRACT_DIR="$(mktemp -d)"
          LFTP_SCRIPT="$(mktemp)"
          trap 'rm -rf "${EXTRACT_DIR}" "${LFTP_SCRIPT}"' EXIT
          unzip -q "${ZIP_FILE}" -d "${EXTRACT_DIR}"

          echo "Uploading via SFTP..."
          SFTP_USER_ENC="$(python3 -c "import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=''))" "${PTERODACTYL_SFTP_USERNAME}")"
          SFTP_PASS_ENC="$(python3 -c "import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=''))" "${PTERODACTYL_SFTP_PASSWORD}")"
          SFTP_URL="sftp://${SFTP_USER_ENC}:${SFTP_PASS_ENC}@${PTERODACTYL_SFTP_HOST}:${SFTP_PORT}"

          {
            echo "open '${SFTP_URL}'"
            echo "set sftp:auto-confirm yes"
            echo "set sftp:max-packets-in-flight 200"
            echo "set net:timeout 60"
            echo "set net:idle 60"
            echo "set net:max-retries 3"
            echo "set net:reconnect-interval-base 5"
            while IFS= read -r local_dir; do
              remote_dir="/$(basename "${local_dir}")"
              echo "mirror --reverse --delete --parallel=8 --verbose '${local_dir}/' '${remote_dir}/'"
            done < <(find "${EXTRACT_DIR}" -mindepth 1 -maxdepth 1 -type d | sort)
            while IFS= read -r local_file; do
              echo "put '${local_file}' -o '/$(basename "${local_file}")'"
            done < <(find "${EXTRACT_DIR}" -mindepth 1 -maxdepth 1 -type f | sort)
            echo "bye"
          } > "${LFTP_SCRIPT}"

          lftp -f "${LFTP_SCRIPT}"

          echo "Starting server..."
          api_json POST "/power" '{"signal":"start"}' >/dev/null

          echo "Deployment completed."
