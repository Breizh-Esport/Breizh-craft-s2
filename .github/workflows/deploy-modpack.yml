name: Deploy Modpack

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-modpack-${{ github.ref }}
  cancel-in-progress: false

env:
  PTERODACTYL_PANEL_URL: ${{ vars.PTERODACTYL_PANEL_URL }}
  PTERODACTYL_SERVER_ID: ${{ vars.PTERODACTYL_SERVER_ID }}
  PTERODACTYL_API_KEY: ${{ secrets.PTERODACTYL_API_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip

      - name: Install pakku
        run: brew install juraj-hrivnak/pakku/pakku

      - name: Build modpack
        run: pakku export

      - name: Deploy to Pterodactyl
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${PTERODACTYL_PANEL_URL}" ] || [ -z "${PTERODACTYL_SERVER_ID}" ] || [ -z "${PTERODACTYL_API_KEY}" ]; then
            echo "Missing required GitHub variables/secrets."
            exit 1
          fi

          PANEL_URL="${PTERODACTYL_PANEL_URL%/}"
          API_BASE="${PANEL_URL}/api/client/servers/${PTERODACTYL_SERVER_ID}"
          AUTH_HEADER="Authorization: Bearer ${PTERODACTYL_API_KEY}"
          ACCEPT_HEADER="Accept: Application/vnd.pterodactyl.v1+json"

          api_json() {
            local method="$1"
            local endpoint="$2"
            local body="${3:-}"
            if [ -n "${body}" ]; then
              curl -fsSL -X "${method}" \
                -H "${AUTH_HEADER}" \
                -H "${ACCEPT_HEADER}" \
                -H "Content-Type: application/json" \
                "${API_BASE}${endpoint}" \
                -d "${body}"
            else
              curl -fsSL -X "${method}" \
                -H "${AUTH_HEADER}" \
                -H "${ACCEPT_HEADER}" \
                "${API_BASE}${endpoint}"
            fi
          }

          echo "Stopping server..."
          api_json POST "/power" '{"signal":"stop"}' || true

          echo "Waiting for server to stop..."
          for _ in $(seq 1 30); do
            state="$(api_json GET "/resources" | jq -r '.attributes.current_state')"
            if [ "${state}" = "offline" ]; then
              break
            fi
            sleep 5
          done

          final_state="$(api_json GET "/resources" | jq -r '.attributes.current_state')"
          if [ "${final_state}" != "offline" ]; then
            echo "Server did not stop in time (state: ${final_state})."
            exit 1
          fi

          echo "Preparing serverpack..."
          ZIP_FILE="$(ls -1 build/serverpack/*.zip | head -n 1)"
          if [ -z "${ZIP_FILE}" ]; then
            echo "No serverpack zip found in build/serverpack."
            exit 1
          fi
          ZIP_NAME="$(basename "${ZIP_FILE}")"

          echo "Cleaning remote /mods directory with safety guard..."
          MODS_ROOT="/mods"
          SAFETY_FILE=".deploy-mods-safety"
          if [ "${MODS_ROOT}" = "/" ] || [ -z "${MODS_ROOT}" ]; then
            echo "Refusing to clean unsafe directory target: '${MODS_ROOT}'."
            exit 1
          fi

          mods_upload_url="$(api_json GET "/files/upload?directory=%2Fmods" | jq -r '.attributes.url')"
          if [ -z "${mods_upload_url}" ] || [ "${mods_upload_url}" = "null" ]; then
            echo "Failed to get upload URL for /mods."
            exit 1
          fi

          echo "safe-delete-check" > /tmp/"${SAFETY_FILE}"
          safety_upload_code="$(curl -sS -o /tmp/ptero-safety-upload-response.txt -w '%{http_code}' -X POST "${mods_upload_url}" \
            -F "files=@/tmp/${SAFETY_FILE}" \
            -F "directory=${MODS_ROOT}")"
          if [ "${safety_upload_code}" -ge 400 ]; then
            echo "Failed to upload safety file to /mods (HTTP ${safety_upload_code})."
            cat /tmp/ptero-safety-upload-response.txt || true
            exit 1
          fi

          mods_list_json="$(api_json GET "/files/list?directory=%2Fmods")"
          if ! echo "${mods_list_json}" | jq -e --arg safe "${SAFETY_FILE}" '.data[] | select(.attributes.name == $safe)' >/dev/null; then
            echo "Safety file was not found in /mods. Aborting cleanup."
            exit 1
          fi

          delete_files_json="$(echo "${mods_list_json}" | jq -c --arg safe "${SAFETY_FILE}" '[.data[].attributes.name | select(. != $safe)]')"
          if [ "${delete_files_json}" != "[]" ]; then
            delete_payload="$(jq -nc --arg root "${MODS_ROOT}" --argjson files "${delete_files_json}" '{root:$root,files:$files}')"
            api_json POST "/files/delete" "${delete_payload}" >/dev/null
          fi

          delete_safety_payload="$(jq -nc --arg root "${MODS_ROOT}" --arg safe "${SAFETY_FILE}" '{root:$root,files:[$safe]}')"
          api_json POST "/files/delete" "${delete_safety_payload}" >/dev/null

          echo "Uploading serverpack archive..."
          upload_url="$(api_json GET "/files/upload?directory=%2F" | jq -r '.attributes.url')"
          if [ -z "${upload_url}" ] || [ "${upload_url}" = "null" ]; then
            echo "Failed to get upload URL for root directory."
            exit 1
          fi

          http_code="$(curl -sS -o /tmp/ptero-upload-response.txt -w '%{http_code}' -X POST "${upload_url}" \
            -F "files=@${ZIP_FILE}" \
            -F "directory=/")"
          if [ "${http_code}" -ge 400 ]; then
            echo "Archive upload failed (HTTP ${http_code})"
            cat /tmp/ptero-upload-response.txt || true
            exit 1
          fi

          echo "Extracting archive on server..."
          decompress_payload="$(jq -nc --arg root "/" --arg file "${ZIP_NAME}" '{root:$root,file:$file}')"
          api_json POST "/files/decompress" "${decompress_payload}" >/dev/null

          echo "Removing uploaded archive..."
          delete_payload="$(jq -nc --arg file "${ZIP_NAME}" '{root:"/",files:[$file]}')"
          api_json POST "/files/delete" "${delete_payload}" >/dev/null

          echo "Starting server..."
          api_json POST "/power" '{"signal":"start"}' >/dev/null

          echo "Deployment completed."
