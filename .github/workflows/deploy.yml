name: Deploy (reusable)

# Reusable deployment workflow. Callers (deploy-preprod.yml / deploy-prod.yml)
# invoke this via `workflow_call` and pass the target GitHub Environment. All
# PTERODACTYL_* vars/secrets resolve to that environment's values, so a single
# script deploys to preprod or prod without duplication.

on:
  workflow_call:
    inputs:
      environment:
        description: Target GitHub Environment (preprod or prod).
        required: true
        type: string
      serverpack_source:
        description: >
          Where the server pack comes from. "build" runs `pakku export` from the
          checked-out ref (dev / continuous delivery). "release" promotes the
          `*-server.zip` asset already published by the Release pipeline for the
          selected tag (preprod / prod fixed releases).
        required: false
        type: string
        default: build

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}
    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false
    env:
      PTERODACTYL_PANEL_URL: ${{ vars.PTERODACTYL_PANEL_URL }}
      PTERODACTYL_SERVER_ID: ${{ vars.PTERODACTYL_SERVER_ID }}
      PTERODACTYL_API_KEY: ${{ secrets.PTERODACTYL_API_KEY }}
      PTERODACTYL_SFTP_HOST: ${{ vars.PTERODACTYL_SFTP_HOST }}
      PTERODACTYL_SFTP_PORT: ${{ vars.PTERODACTYL_SFTP_PORT }}
      PTERODACTYL_SFTP_USERNAME: ${{ vars.PTERODACTYL_SFTP_USERNAME }}
      PTERODACTYL_SFTP_PASSWORD: ${{ secrets.PTERODACTYL_SFTP_PASSWORD }}
      VOICECHAT_PORT: ${{ vars.VOICECHAT_PORT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip lftp

      # --- serverpack_source: build --- (dev / continuous delivery)
      - name: Setup Homebrew
        if: inputs.serverpack_source == 'build'
        uses: Homebrew/actions/setup-homebrew@master

      - name: Install pakku
        if: inputs.serverpack_source == 'build'
        env:
          HOMEBREW_NO_SANDBOX_LINUX: 1
        run: brew install juraj-hrivnak/pakku/pakku

      - name: Build modpack
        if: inputs.serverpack_source == 'build'
        run: pakku export

      # --- serverpack_source: release --- (preprod / prod fixed releases)
      # Promote the exact `*-server.zip` published by the Release pipeline for
      # the selected tag, rather than re-resolving mods at deploy time. This
      # guarantees preprod/prod deploy the same bytes shipped to CurseForge.
      - name: Download released server pack
        if: inputs.serverpack_source == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          echo "Promoting released server pack for tag: ${TAG}"

          mkdir -p build/serverpack
          if ! gh release download "${TAG}" \
            --pattern '*-server.zip' \
            --dir build/serverpack; then
            echo "No '*-server.zip' asset found on release '${TAG}'."
            echo "Run the Release pipeline for this tag before deploying ${{ inputs.environment }}."
            exit 1
          fi

      - name: Deploy to Pterodactyl
        shell: bash
        run: |
          set -euo pipefail

          echo "Deploying to environment: ${{ inputs.environment }}"

          if [ -z "${PTERODACTYL_PANEL_URL}" ] || [ -z "${PTERODACTYL_SERVER_ID}" ] || [ -z "${PTERODACTYL_API_KEY}" ]; then
            echo "Missing required Pterodactyl API variables/secrets."
            exit 1
          fi

          if [ -z "${PTERODACTYL_SFTP_HOST}" ] || [ -z "${PTERODACTYL_SFTP_USERNAME}" ] || [ -z "${PTERODACTYL_SFTP_PASSWORD}" ]; then
            echo "Missing required SFTP variables/secrets."
            exit 1
          fi

          PANEL_URL="${PTERODACTYL_PANEL_URL%/}"
          API_BASE="${PANEL_URL}/api/client/servers/${PTERODACTYL_SERVER_ID}"
          AUTH_HEADER="Authorization: Bearer ${PTERODACTYL_API_KEY}"
          ACCEPT_HEADER="Accept: Application/vnd.pterodactyl.v1+json"
          SFTP_PORT="${PTERODACTYL_SFTP_PORT:-2022}"
          SFTP_HOST="${PTERODACTYL_SFTP_HOST#sftp://}"
          SFTP_HOST="${SFTP_HOST#ssh://}"

          api_json() {
            local method="$1"
            local endpoint="$2"
            local body="${3:-}"
            if [ -n "${body}" ]; then
              curl -fsSL -X "${method}" \
                -H "${AUTH_HEADER}" \
                -H "${ACCEPT_HEADER}" \
                -H "Content-Type: application/json" \
                "${API_BASE}${endpoint}" \
                -d "${body}"
            else
              curl -fsSL -X "${method}" \
                -H "${AUTH_HEADER}" \
                -H "${ACCEPT_HEADER}" \
                "${API_BASE}${endpoint}"
            fi
          }

          echo "Stopping server..."
          api_json POST "/power" '{"signal":"stop"}' || true

          echo "Waiting for server to stop..."
          for _ in $(seq 1 30); do
            state="$(api_json GET "/resources" | jq -r '.attributes.current_state')"
            if [ "${state}" = "offline" ]; then
              break
            fi
            sleep 5
          done

          final_state="$(api_json GET "/resources" | jq -r '.attributes.current_state')"
          if [ "${final_state}" != "offline" ]; then
            echo "Server did not stop in time (state: ${final_state})."
            exit 1
          fi

          echo "Preparing serverpack..."
          ZIP_FILE="$(ls -1 build/serverpack/*.zip | head -n 1)"
          if [ -z "${ZIP_FILE}" ]; then
            echo "No serverpack zip found in build/serverpack."
            exit 1
          fi

          echo "Extracting serverpack locally..."
          EXTRACT_DIR="$(mktemp -d)"
          LFTP_SCRIPT="$(mktemp)"
          trap 'rm -rf "${EXTRACT_DIR}" "${LFTP_SCRIPT}"' EXIT
          # Exclude client-only emotes: EmoteCraft emote files are never needed
          # server-side, and their long Cyrillic names exceed the 255-byte
          # filename limit (ENAMETOOLONG). Guards deploys of older release assets
          # built before emotes became a client_overrides entry.
          unzip -q "${ZIP_FILE}" -d "${EXTRACT_DIR}" -x 'emotes/*'

          # Simple Voice Chat: all environments run on the same host, so each
          # server needs a distinct UDP port. The gitted default (24454) is
          # overwritten here with the per-environment VOICECHAT_PORT variable.
          if [ -n "${VOICECHAT_PORT:-}" ]; then
            VC_CONFIG="${EXTRACT_DIR}/config/voicechat/voicechat-server.properties"
            if [ -f "${VC_CONFIG}" ]; then
              echo "Setting Simple Voice Chat port to ${VOICECHAT_PORT}"
              sed -i "s/^port=.*/port=${VOICECHAT_PORT}/" "${VC_CONFIG}"
            else
              echo "Warning: ${VC_CONFIG} not found, skipping voice chat port override."
            fi
          fi

          echo "Scanning SFTP host key..."
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -p "${SFTP_PORT}" -H "${SFTP_HOST}" >> ~/.ssh/known_hosts

          echo "Uploading via SFTP..."
          SFTP_USER_ENC="$(python3 -c "import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=''))" "${PTERODACTYL_SFTP_USERNAME}")"
          SFTP_PASS_ENC="$(python3 -c "import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=''))" "${PTERODACTYL_SFTP_PASSWORD}")"
          SFTP_URL="sftp://${SFTP_USER_ENC}:${SFTP_PASS_ENC}@${SFTP_HOST}:${SFTP_PORT}"

          {
            echo "set sftp:auto-confirm yes"
            echo "set sftp:max-packets-in-flight 200"
            echo "set net:timeout 60"
            echo "set net:idle 60"
            echo "set net:max-retries 3"
            echo "set net:reconnect-interval-base 5"
            echo "open ${SFTP_URL}"
            while IFS= read -r local_dir; do
              base="$(basename "${local_dir}")"
              remote_dir="/${base}"
              mirror_opts="--reverse --delete --parallel=8 --verbose"
              if [ "${base}" = "config" ]; then
                mirror_opts="${mirror_opts} --exclude luckperms/ --exclude bluemap/ --exclude manas_queue/ --exclude bfcrmod-common.toml"
              fi
              if [ "${base}" = "mods" ]; then
                mirror_opts="${mirror_opts} --exclude LuckPerms --exclude bluemap --exclude manascore --exclude manas_queue --exclude bfcrmod"
              fi
              echo "mirror ${mirror_opts} ${local_dir}/ ${remote_dir}/"
            done < <(find "${EXTRACT_DIR}" -mindepth 1 -maxdepth 1 -type d | sort)
            while IFS= read -r local_file; do
              echo "put ${local_file} -o /$(basename "${local_file}")"
            done < <(find "${EXTRACT_DIR}" -mindepth 1 -maxdepth 1 -type f | sort)
            echo "bye"
          } > "${LFTP_SCRIPT}"

          lftp -f "${LFTP_SCRIPT}"

          echo "Starting server..."
          api_json POST "/power" '{"signal":"start"}' >/dev/null

          echo "Deployment to ${{ inputs.environment }} completed."
