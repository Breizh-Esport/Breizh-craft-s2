name: Release Modpack

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Build once, publish many. Each external target is its own job so that
  # GitHub's "Re-run failed jobs" replays only the target that failed,
  # without rebuilding the modpack or re-hitting the targets that succeeded.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_type: ${{ steps.meta.outputs.release_type }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Install pakku
        env:
          HOMEBREW_NO_SANDBOX_LINUX: 1
        run: brew install juraj-hrivnak/pakku/pakku

      - name: Export modpack
        run: pakku export

      - name: Resolve release metadata
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          if [[ "$VERSION" == *"-alpha"* ]]; then
            RELEASE_TYPE="alpha"
            IS_PRERELEASE="true"
          elif [[ "$VERSION" == *"-beta"* ]]; then
            RELEASE_TYPE="beta"
            IS_PRERELEASE="true"
          else
            RELEASE_TYPE="release"
            IS_PRERELEASE="false"
          fi

          echo "version=$VERSION"             >> "$GITHUB_OUTPUT"
          echo "release_type=$RELEASE_TYPE"   >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Stage release assets
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          CF_ZIP="$(ls build/curseforge/*.zip | head -1)"
          MR_PACK="$(ls build/modrinth/*.mrpack | head -1)"
          SERVER_ZIP="$(ls build/serverpack/*.zip | head -1)"

          mkdir -p build/release
          cp "$CF_ZIP"     "build/release/BreizhCraft-${VERSION}-curseforge.zip"
          cp "$MR_PACK"    "build/release/BreizhCraft-${VERSION}.mrpack"
          cp "$SERVER_ZIP" "build/release/BreizhCraft-${VERSION}-server.zip"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: build/release/
          retention-days: 7
          if-no-files-found: error

  publish-github:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release

      # action-gh-release updates an existing release in place, so re-running
      # this job is safe and idempotent.
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: BreizhCraft v${{ needs.build.outputs.version }}
          prerelease: ${{ needs.build.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: |
            release/*

  publish-modrinth:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Upload to Modrinth
        run: |
          set -euo pipefail

          VERSION="${{ needs.build.outputs.version }}"
          RELEASE_TYPE="${{ needs.build.outputs.release_type }}"
          MR_PACK="release/BreizhCraft-${VERSION}.mrpack"

          # Idempotency guard: skip if this version already exists, so a replay
          # after a partial failure does not create a duplicate version.
          EXISTING=$(curl -sf "https://api.modrinth.com/v2/project/${MODRINTH_PROJECT_ID}/version" \
            -H "Authorization: $MODRINTH_TOKEN" \
            | jq -r --arg v "$VERSION" 'map(select(.version_number == $v)) | length')

          if [[ "$EXISTING" != "0" ]]; then
            echo "Modrinth already has version ${VERSION}; skipping upload."
            exit 0
          fi

          DATA=$(jq -cn \
            --arg name "BreizhCraft v${VERSION}" \
            --arg version_number "$VERSION" \
            --arg version_type "$RELEASE_TYPE" \
            --arg project_id "$MODRINTH_PROJECT_ID" \
            '{
              name: $name,
              version_number: $version_number,
              changelog: "See GitHub release for full changelog.",
              dependencies: [],
              game_versions: ["1.21.1"],
              version_type: $version_type,
              loaders: ["neoforge"],
              featured: true,
              project_id: $project_id,
              file_parts: ["mrpack"]
            }')

          curl -sf "https://api.modrinth.com/v2/version" \
            -H "Authorization: $MODRINTH_TOKEN" \
            -F "data=$DATA" \
            -F "mrpack=@${MR_PACK};type=application/x-modrinth-modpack+zip"

  publish-curseforge-modpack:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      file_id: ${{ steps.cf_upload.outputs.file_id }}
    env:
      CURSEFORGE_PROJECT_ID: ${{ vars.CURSEFORGE_PROJECT_ID }}
      CURSEFORGE_API_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Resolve CurseForge game version IDs
        id: cf_versions
        run: |
          TYPES=$(curl -sf "https://minecraft.curseforge.com/api/game/version-types" \
            -H "X-Api-Token: $CURSEFORGE_API_TOKEN") || {
            echo "Failed to fetch CurseForge version types"
            exit 1
          }

          MC_TYPE_ID=$(echo "$TYPES" \
            | jq 'first(.[] | select(.slug == "minecraft-1-21") | .id)') || {
            echo "Failed to parse version types"
            exit 1
          }

          if [[ -z "$MC_TYPE_ID" || "$MC_TYPE_ID" == "null" ]]; then
            echo "Could not find Minecraft 1.21 version type. Available types:"
            echo "$TYPES" | jq '[.[] | {id, name, slug}]'
            exit 1
          fi

          VERSIONS=$(curl -sf "https://minecraft.curseforge.com/api/game/versions" \
            -H "X-Api-Token: $CURSEFORGE_API_TOKEN") || {
            echo "Failed to fetch CurseForge game versions"
            exit 1
          }

          GAME_VERSION_IDS=$(echo "$VERSIONS" \
            | jq -c --argjson typeId "$MC_TYPE_ID" \
            '[.[] | select(.name == "1.21.1" and .gameVersionTypeID == $typeId) | .id]') || {
            echo "Failed to parse CurseForge game versions"
            exit 1
          }

          if [[ "$GAME_VERSION_IDS" == "[]" ]]; then
            echo "No version ID found for '1.21.1' under type $MC_TYPE_ID"
            exit 1
          fi

          echo "ids=$GAME_VERSION_IDS" >> "$GITHUB_OUTPUT"

      - name: Upload modpack to CurseForge
        id: cf_upload
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          RELEASE_TYPE="${{ needs.build.outputs.release_type }}"
          CF_ZIP="release/BreizhCraft-${VERSION}-curseforge.zip"
          GAME_VERSIONS='${{ steps.cf_versions.outputs.ids }}'

          METADATA=$(jq -cn \
            --arg displayName "BreizhCraft v${VERSION}" \
            --arg releaseType "$RELEASE_TYPE" \
            --argjson gameVersions "$GAME_VERSIONS" \
            '{
              changelog: "See GitHub release for full changelog.",
              changelogType: "text",
              displayName: $displayName,
              releaseType: $releaseType,
              gameVersions: $gameVersions
            }')

          # Retry on transient 5xx / network errors (CurseForge's Cloudflare
          # front-end returns intermittent 502s). A 4xx is a real error and is
          # not retried.
          HTTP_STATUS=""
          BODY=""
          for attempt in 1 2 3 4 5; do
            if ! RESPONSE=$(curl -s \
              -w "\n%{http_code}" \
              "https://minecraft.curseforge.com/api/projects/${CURSEFORGE_PROJECT_ID}/upload-file" \
              -H "X-Api-Token: $CURSEFORGE_API_TOKEN" \
              -F "metadata=$METADATA" \
              -F "file=@${CF_ZIP}"); then
              echo "CurseForge upload request failed (network error, attempt ${attempt})"
              sleep $((attempt * 10))
              continue
            fi

            HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)
            echo "CurseForge response (HTTP ${HTTP_STATUS}): ${BODY}"

            if [[ "$HTTP_STATUS" == "200" ]]; then
              break
            fi

            if [[ "$HTTP_STATUS" =~ ^5 ]]; then
              echo "Transient HTTP ${HTTP_STATUS}; retrying in $((attempt * 10))s"
              sleep $((attempt * 10))
              continue
            fi

            echo "CurseForge upload failed (non-retryable HTTP ${HTTP_STATUS})"
            exit 1
          done

          if [[ "$HTTP_STATUS" != "200" ]]; then
            echo "CurseForge upload failed after retries"
            exit 1
          fi

          FILE_ID=$(echo "$BODY" | jq -r '.id') || {
            echo "Failed to parse CurseForge response"
            exit 1
          }

          if [[ -z "$FILE_ID" || "$FILE_ID" == "null" ]]; then
            echo "No file ID in CurseForge response"
            exit 1
          fi

          echo "file_id=$FILE_ID" >> "$GITHUB_OUTPUT"

  # Split from the modpack upload so that, if only the server pack fails, a
  # "Re-run failed jobs" replays just this job and reuses the parent file_id
  # from the (still-successful) modpack job — no duplicate modpack upload.
  publish-curseforge-serverpack:
    needs: [build, publish-curseforge-modpack]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CURSEFORGE_PROJECT_ID: ${{ vars.CURSEFORGE_PROJECT_ID }}
      CURSEFORGE_API_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Upload server pack to CurseForge
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          RELEASE_TYPE="${{ needs.build.outputs.release_type }}"
          SERVER_ZIP="release/BreizhCraft-${VERSION}-server.zip"
          PARENT_FILE_ID="${{ needs.publish-curseforge-modpack.outputs.file_id }}"

          if [[ -z "$PARENT_FILE_ID" ]]; then
            echo "Error: CurseForge main upload file ID is missing"
            exit 1
          fi

          METADATA=$(jq -cn \
            --arg displayName "BreizhCraft v${VERSION} - Server Pack" \
            --arg releaseType "$RELEASE_TYPE" \
            --arg parentFileID "$PARENT_FILE_ID" \
            '{
              changelog: "Server pack",
              changelogType: "text",
              displayName: $displayName,
              releaseType: $releaseType,
              parentFileID: ($parentFileID | tonumber),
              childFileType: 2
            }')

          # Retry on transient 5xx / network errors (CurseForge's Cloudflare
          # front-end returns intermittent 502s). A 4xx is a real error and is
          # not retried.
          HTTP_STATUS=""
          for attempt in 1 2 3 4 5; do
            if ! RESPONSE=$(curl -s \
              -w "\n%{http_code}" \
              "https://minecraft.curseforge.com/api/projects/${CURSEFORGE_PROJECT_ID}/upload-file" \
              -H "X-Api-Token: $CURSEFORGE_API_TOKEN" \
              -F "metadata=$METADATA" \
              -F "file=@${SERVER_ZIP}"); then
              echo "CurseForge server pack upload request failed (network error, attempt ${attempt})"
              sleep $((attempt * 10))
              continue
            fi

            HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)
            echo "CurseForge response (HTTP ${HTTP_STATUS}): ${BODY}"

            if [[ "$HTTP_STATUS" == "200" ]]; then
              break
            fi

            if [[ "$HTTP_STATUS" =~ ^5 ]]; then
              echo "Transient HTTP ${HTTP_STATUS}; retrying in $((attempt * 10))s"
              sleep $((attempt * 10))
              continue
            fi

            echo "CurseForge server pack upload failed (non-retryable HTTP ${HTTP_STATUS})"
            exit 1
          done

          if [[ "$HTTP_STATUS" != "200" ]]; then
            echo "CurseForge server pack upload failed after retries"
            exit 1
          fi
