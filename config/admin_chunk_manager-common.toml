						#Public builds - Public team
						[claimTypes.claimTypes.claimTypes.claimTypes.claimTypes.claimTypes.public]
							#Allow explosions to damage blocks
							allowExplosions = false
							#Allow mob griefing (endermen, creepers, etc.)
